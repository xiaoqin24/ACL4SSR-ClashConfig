  #port: 7890
  #socks-port: 1080
  redir-port: 7891
  tproxy-port: 7892
  #allow-lan: true
  #bind-address: "*"
  mode: rule
  unified-delay: true
  tcp-concurrent: true
  udp: true
  global-client-fingerprint: random
  geox-url:
    geosite: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
    mmdb: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
    geoip: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat
    asn: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
  geo-auto-update: true
  geo-update-interval: 8
  sniffer:
    enable: true
    force-dns-mapping: true
    parse-pure-ip: true
    skip-domain:
      - +.push.apple.com
      - Mijia Cloud
    sniff:
      HTTP:
        port:
          - "80"
          - 8080-8880
        override-destination: true
      TLS:
        port:
          - "443"
          - "8443"
        override-destination: true
      QUIC:
        port:
          - "443"
          - "8443"
        override-destination: true
  profile:
    store-selected: true
    store-fake-ip: true
    tracing: false
  dns:
    enable: true
    prefer-h3: true
    cache-algorithm: arc
    listen: '[::]:1053'
    enhanced-mode: fake-ip
    fake-ip-filter-mode: blacklist
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter:
      - "*.lan"
      - "*.localhost"
      - "*.local"
      - "*.globalfnf.com"
      - "*.wvbox.xyz"
      - "*.193391.xyz"
      - "*.668828.xyz"
      - "geosite:cn,geolocation-cn,onedrive,microsoft,microsoft@cn,apple,apple-cn,steam@cn,category-games@cn,private"
      - "*.synology.com"
      - "*.synology.me"
      - "*.synology.net"
      - "*.miwifi.com"
    respect-rules: true
    default-nameserver:
      - 223.5.5.5
      - 119.29.29.29
      - 223.6.6.6
      - 119.28.28.28
    proxy-server-nameserver:
