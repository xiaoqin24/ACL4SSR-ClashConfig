    asn: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
  geo-auto-update: true
  geo-update-interval: 8
  sniffer:
    enable: true
    force-dns-mapping: true
    parse-pure-ip: true
    skip-domain:
      - +.push.apple.com
      - Mijia Cloud
    sniff:
      HTTP:
        port:
          - "80"
          - "8080"
        override-destination: true
      TLS:
        port:
          - "443"
          - "8443"
        override-destination: true
      QUIC:
        port:
          - "443"
          - "8443"
        override-destination: true
  profile:
    store-selected: true
    store-fake-ip: true
    tracing: false
  dns:
